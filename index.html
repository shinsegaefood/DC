<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퇴직연금 설명회 참석여부</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f0f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    .header-bar {
      height: 10px;
      background: linear-gradient(90deg, #4a6cf7, #6c5ce7);
      border-radius: 12px 12px 0 0;
    }

    .card {
      background: #fff;
      border-radius: 0 0 12px 12px;
      padding: 32px 28px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .card.standalone {
      border-radius: 12px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .required-note {
      font-size: 13px;
      color: #dc2626;
      margin-top: 12px;
    }

    .emp-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 14px;
      background: #f0f0ff;
      color: #4a6cf7;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .question-label {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a2e;
      margin-bottom: 20px;
    }

    .question-label .req {
      color: #dc2626;
      margin-left: 2px;
    }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .radio-option {
      position: relative;
      display: flex;
      align-items: center;
      padding: 16px 20px;
      cursor: pointer;
      border-radius: 10px;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .radio-option:hover { background: #f5f5ff; }

    .radio-option input { display: none; }

    .radio-circle {
      width: 22px;
      height: 22px;
      border: 2px solid #c4c4c4;
      border-radius: 50%;
      margin-right: 14px;
      flex-shrink: 0;
      position: relative;
      transition: border-color 0.15s;
    }

    .radio-option input:checked ~ .radio-circle { border-color: #4a6cf7; }

    .radio-option input:checked ~ .radio-circle::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      background: #4a6cf7;
      border-radius: 50%;
    }

    .radio-option input:checked ~ .radio-text {
      color: #4a6cf7;
      font-weight: 500;
    }

    .radio-text {
      font-size: 15px;
      color: #374151;
      transition: color 0.15s;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .btn-submit {
      background: #4a6cf7;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-submit:hover { background: #3b5de7; }
    .btn-submit:active { transform: scale(0.97); }
    .btn-submit:disabled {
      background: #a0aec0;
      cursor: not-allowed;
      transform: none;
    }

    .btn-clear {
      background: none;
      border: none;
      color: #4a6cf7;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .btn-clear:hover { background: #f5f5ff; }

    /* 결과 화면 */
    .result-card {
      background: #fff;
      border-radius: 12px;
      padding: 48px 28px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      display: none;
    }

    .result-card.show { display: block; }

    .result-icon {
      width: 64px;
      height: 64px;
      background: #e8f5e9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }

    .result-title {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .result-desc {
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .result-choice {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 20px;
      background: #f0f0ff;
      color: #4a6cf7;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
    }

    .error-msg {
      color: #dc2626;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .error-msg.show { display: block; }

    .btn-submit .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    .btn-submit.loading .spinner { display: inline-block; }
    .btn-submit.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 24px;
    }

    /* ── 사번 입력 팝업 ── */
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 16px;
    }

    .overlay.hidden { display: none; }

    .popup {
      background: #fff;
      border-radius: 16px;
      padding: 36px 28px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      text-align: center;
    }

    .popup-icon {
      width: 52px;
      height: 52px;
      background: #f0f0ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 24px;
    }

    .popup h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .popup p {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 20px;
    }

    .popup input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      text-align: center;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.15s;
    }

    .popup input:focus { border-color: #4a6cf7; }

    .popup input.error { border-color: #dc2626; }

    .popup .popup-error {
      color: #dc2626;
      font-size: 12px;
      margin-top: 6px;
      min-height: 18px;
    }

    .popup .btn-confirm {
      width: 100%;
      margin-top: 16px;
      background: #4a6cf7;
      color: #fff;
      border: none;
      padding: 14px;
      font-size: 15px;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .popup .btn-confirm:hover { background: #3b5de7; }
  </style>
</head>
<body>

<!-- 사번 입력 팝업 -->
<div class="overlay" id="empOverlay">
  <div class="popup">
    <div class="popup-icon">👤</div>
    <h2>사번을 입력해 주세요</h2>
    <p>참석 확인을 위해 사번이 필요합니다</p>
    <input type="text" id="empInput" placeholder="사번 입력" maxlength="10"
           onkeydown="if(event.key==='Enter') confirmEmp()">
    <div class="popup-error" id="empError"></div>
    <button class="btn-confirm" onclick="confirmEmp()">확인</button>
  </div>
</div>

<div class="container">
  <!-- 폼 화면 -->
  <div id="formView">
    <div class="header-bar"></div>
    <div class="card">
      <h1 class="title">퇴직연금 DC형(확정기여형) 설명회 참석여부</h1>
      <p class="subtitle">참석 방식을 선택해 주세요.</p>
      <p class="required-note">* 표시는 필수 질문입니다</p>
      <div class="emp-badge" id="empBadge"></div>
    </div>

    <div class="card standalone">
      <p class="question-label">온/오프라인 참석현황 <span class="req">*</span></p>
      <div class="radio-group">
        <label class="radio-option">
          <input type="radio" name="attendance" value="오프라인 참석(7/30(목) 오후2시, 대회의실)">
          <span class="radio-circle"></span>
          <span class="radio-text">오프라인 참석(7/30(목) 오후2시, 대회의실)</span>
        </label>
        <label class="radio-option">
          <input type="radio" name="attendance" value="온라인 참석(zoom링크 당일 공지예정)">
          <span class="radio-circle"></span>
          <span class="radio-text">온라인 참석(zoom링크 당일 공지예정)</span>
        </label>
      </div>
      <p class="error-msg" id="errorMsg">참석 방식을 선택해 주세요.</p>
    </div>

    <div class="actions">
      <button class="btn-submit" id="submitBtn" onclick="submitForm()">
        <span class="spinner"></span>
        <span class="btn-text">제출</span>
      </button>
      <button class="btn-clear" onclick="clearForm()">양식 지우기</button>
    </div>
  </div>

  <!-- 완료 화면 -->
  <div class="result-card" id="resultView">
    <div class="result-icon">✓</div>
    <p class="result-title">응답이 기록되었습니다</p>
    <p class="result-desc">참여해 주셔서 감사합니다.<br>동일 사번으로 다시 제출 시 최종 응답만 반영됩니다.</p>
    <div class="result-choice" id="resultChoice"></div>
  </div>

  <p class="footer">신세계푸드 인사관리팀</p>
</div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfW5yCmdOqgI7KYm9jvH09uNZ4twjD1gIWIP4m8MGpPUOClDjRhfSeU5hHlN31qySFLw/exec';

  let employeeId = '';

  // 사번 입력 확인
  function confirmEmp() {
    const input = document.getElementById('empInput');
    const error = document.getElementById('empError');
    const val = input.value.trim();

    if (!val) {
      input.classList.add('error');
      error.textContent = '사번을 입력해 주세요.';
      return;
    }

    input.classList.remove('error');
    error.textContent = '';
    employeeId = val;

    // 팝업 닫기, 사번 배지 표시
    document.getElementById('empOverlay').classList.add('hidden');
    document.getElementById('empBadge').textContent = '사번: ' + employeeId;
  }

  // 폼 제출
  function submitForm() {
    const selected = document.querySelector('input[name="attendance"]:checked');
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('submitBtn');

    if (!selected) {
      errorMsg.classList.add('show');
      return;
    }
    errorMsg.classList.remove('show');

    btn.classList.add('loading');
    btn.disabled = true;

    const formData = new FormData();
    formData.append('empId', employeeId);
    formData.append('attendance', selected.value);
    formData.append('timestamp', new Date().toLocaleString('ko-KR'));

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: formData,
    })
    .then(res => res.text())
    .then(() => {
      document.getElementById('formView').style.display = 'none';
      document.getElementById('resultView').classList.add('show');
      document.getElementById('resultChoice').textContent = selected.value;
    })
    .catch(err => {
      alert('전송 중 오류가 발생했습니다. 다시 시도해 주세요.');
      btn.classList.remove('loading');
      btn.disabled = false;
    });
  }

  function clearForm() {
    const radios = document.querySelectorAll('input[name="attendance"]');
    radios.forEach(r => r.checked = false);
    document.getElementById('errorMsg').classList.remove('show');
  }

  // 페이지 로드 시 사번 입력창 포커스
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('empInput').focus();
  });
</script>

</body>
</html>
